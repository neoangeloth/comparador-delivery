<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mejor Delivery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #ff4d00;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 { font-size: 24px; font-weight: 700; }
    header p  { font-size: 14px; opacity: 0.85; margin-top: 4px; }

    .search-box {
      display: flex;
      gap: 8px;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-box input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    .search-box input:focus { border-color: #ff4d00; }

    .search-box button {
      padding: 12px 20px;
      background: #ff4d00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }

    .search-box button:hover { background: #e04400; }

    #status {
      text-align: center;
      padding: 12px;
      font-size: 14px;
      color: #666;
    }

    .results {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card.winner { border: 2px solid #ff4d00; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .platform {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .platform.rappi     { background: #ff441a20; color: #ff441a; }
    .platform.pedidosya { background: #ff000020; color: #cc0000; }
    .platform.ubereats  { background: #00000015; color: #000; }

    .badge-winner {
      font-size: 11px;
      background: #ff4d00;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .restaurant { font-size: 15px; font-weight: 600; }
    .product    { font-size: 13px; color: #666; }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .prices { font-size: 13px; color: #888; }
    .final-price {
      font-size: 20px;
      font-weight: 700;
      color: #ff4d00;
    }

    .meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #999;
    }

    .btn-order {
      display: block;
      text-align: center;
      padding: 10px;
      background: #ff4d00;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-top: 4px;
    }

    .btn-order:hover { background: #e04400; }
  </style>
</head>
<body>

<header>
  <h1>🛵 Mejor Delivery</h1>
  <p>Compara precios en Rappi, PedidosYa y Uber Eats</p>
</header>

<div class="search-box">
  <input type="text" id="query" placeholder="¿Qué quieres pedir? ej: hamburguesa" />
  <button onclick="buscar()">Buscar</button>
</div>

<div id="status"></div>
<div class="results" id="results"></div>

<script>
  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });

  async function buscar() {
    const query = document.getElementById('query').value.trim();
    if (!query) return;

    const status  = document.getElementById('status');
    const results = document.getElementById('results');

    status.textContent  = 'Buscando las mejores ofertas...';
    results.innerHTML   = '';

    try {
      const res  = await fetch('/api/search?query=' + encodeURIComponent(query));
      const data = await res.json();

      if (!data.results || data.results.length === 0) {
        status.textContent = 'No se encontraron resultados.';
        return;
      }

      status.textContent = data.results.length + ' ofertas encontradas — ordenadas por precio final';

      data.results.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card' + (index === 0 ? ' winner' : '');

        const discount = item.discount > 0
          ? `<span style="color:#2a9d2a">-$${item.discount.toFixed(2)} descuento</span> · `
          : '';

        card.innerHTML = `
          <div class="card-top">
            <span class="platform ${item.platform}">${item.platform}</span>
            ${index === 0 ? '<span class="badge-winner">Mejor precio</span>' : ''}
          </div>
          <div class="restaurant">${item.restaurantName}</div>
          <div class="product">${item.productName}</div>
          <div class="card-bottom">
            <div>
              <div class="prices">${discount}envío $${item.deliveryFee.toFixed(2)}</div>
              <div class="final-price">$${item.finalPrice.toFixed(2)}</div>
            </div>
            <div class="meta">
              <span>⏱ ${item.estimatedTime}</span>
              ${item.rating ? '<span>⭐ ' + item.rating + '</span>' : ''}
            </div>
          </div>
          <a class="btn-order" href="${item.deepLink}" target="_blank">
            Pedir en ${item.platform} →
          </a>
        `;

        results.appendChild(card);
      });

    } catch (err) {
      status.textContent = 'Error al conectar con el servidor.';
    }
  }
</script>

</body>
</html>
